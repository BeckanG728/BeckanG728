name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: BeckanG728

          committer_branch: main

          template: classic
          base: header, activity, repositories

          plugin_languages: yes
          plugin_isocalendar: yes
